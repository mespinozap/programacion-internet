<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas de Vuelos</title>
  <link rel="stylesheet" href="estilos.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<div class="container">
    <div class="header text-center">
      <div class="header-title">Reservas de vuelos </div>
      <div class="header-subtitle">Realiza tu reserva de vuelo de forma rápida y sencilla.</div>
      </div>

  <div class="card">
      <nav class="nav-menu">
        <ul class="nav-list">
          <li class="menu-item list-inline-item"><a href="index.html">Inicio</a></li>
          <li class="menu-item list-inline-item"><a href="rutas.html">Rutas</a></li>
          <li class="menu-item list-inline-item"><a href="destinos.html">Destinos</a></li>
          <li class="menu-item list-inline-item"><a href="quienesSomos.html">¿Quiénes somos?</a></li>
          <li class="menu-item list-inline-item"><button id="btnLogout" class="btn btn-sm btn-logout">Cerrar Sesión</button></li>
      </nav>
    </div>

  <!-- Formulario -->
    <div class="card form-card text-center mt-3">
      <h1 id="tituloForm">Formulario de Reserva</h1>
      <div class="controls mt-3">
        <input type="hidden" id="txtId" />
        <div class="field text-center mt-3">
          <label for="pasajero">Nombre del Pasajero</label>
          <input type="text" id="pasajero" required />
        </div>
        <div class="field text-center mt-3">
          <label for="correo">Correo Electrónico</label>
          <input type="email" id="correo" required />
        </div>
        <div class="field text-center mt-3">
          <label for="ruta">Ruta</label>
          <input type="text" id="ruta" required />
        </div>
        <div class="field text-center mt-3">
          <label for="fecha_salida">Fecha de Salida</label>
          <input type="date" id="fecha_salida" required />
        </div>
        <div class="field text-center mt-3">
          <label for="fecha_llegada">Fecha de Llegada</label>
          <input type="date" id="fecha_llegada" required />
        </div>
        <div class="field text-center mt-3">
          <label for="asiento">Asiento</label>
          <input type="text" id="asiento" />
        </div>
        <div class="field buttons text-center mt-3">
          <button id="btnAdd" class="btn btn-primary" type="button">Confirmar Reserva</button>
          <button id="btnCancel" class="btn btn-secondary" type="button">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Boton -->
    <div class="card mt-3">
      <div class="field text-center">
      <button id="btnLoad" class="btn btn-primary" type="button">
        Consultar Reservas
      </button>
    </div>
    </div>

    <!-- Tabla -->
    <div class="card mt-3">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pasajero</th>
              <th>Correo</th>
              <th>Ruta</th>
              <th>Fecha de Salida</th>
              <th>Fecha de Llegada</th>
              <th>Asiento</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyReservas"></tbody>
        </table>
      </div>
    </div>

    <div class="footer">
      <p>&copy; 2026 Sistema de Vuelos</p>
      <p class ="text-link "><a href="quienesSomos.html">By Minor Espinoza</a></p>
    </div>
  </div>
  <script type="module" src="reserva.js"></script>
  <script type="module" src="sesion.js"></script>
</body>
</html>
