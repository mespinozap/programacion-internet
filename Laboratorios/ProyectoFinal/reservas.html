<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas de Vuelos</title>
  <link rel="stylesheet" href="estilos.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <header class="bg-light text-center p-4">
    <h1>Reservas de Vuelos</h1>
    <p>Realiza tu reserva de vuelo de forma rápida y sencilla.</p>
  </header>

  <nav class="nav-menu">
      <ul class="nav-list">
        <li class="menu-item"><a href="index.html">Inicio</a></li>
        <li class="menu-item"><a href="rutas.html">Rutas</a></li>
        <li class="menu-item"><a href="destinos.html">Destinos</a></li>
        <li class="menu-item"><a href="quienesSomos.html">¿Quiénes somos?</a></li>
      </ul>
    </nav>

  <main class="container my-4">
    <section class="card p-4 mx-auto" style="max-width: 600px;">
      <form>
        <fieldset>
          <legend>Formulario de Reserva</legend>

          <div class="mb-3">
            <label for="pasajero" class="form-label">Nombre del Pasajero</label>
            <input type="text" class="form-control" id="pasajero" required>
          </div>

          <div class="mb-3">
            <label for="correo" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="correo" required>
          </div>

          <div class="mb-3">
            <label for="ruta" class="form-label">Ruta</label>
            <select class="form-select" id="ruta">
              <option>San José → Madrid</option>
              <option>San José → Miami</option>
              <option>San José → Panamá</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="fecha" class="form-label">Fecha de Salida</label>
            <input type="date" class="form-control" id="fecha" required>
          </div>

          <div class="mb-3">
            <label for="asiento" class="form-label">Asiento</label>
            <input type="text" class="form-control" id="asiento" placeholder="Ej: 12A">
          </div>

          <button type="submit" class="btn btn-primary w-100">Confirmar Reserva</button>
        </fieldset>
      </form>
    </section>
  </main>

  <footer class="text-center p-3 bg-light">
      <p>&copy; 2026 Sistema de Vuelos</p>
      <p class ="text-link "><a href="quienesSomos.html">By Minor Espinoza</a></p>
    </footer>
</body>
</html>
