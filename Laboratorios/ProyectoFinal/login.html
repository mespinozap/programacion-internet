<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Sistema de Vuelos</title>
  <link rel="stylesheet" href="estilos.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">

  <div class="header text-center">
    <div class="header-title">Login</div>
    <div class="header-subtitle">Registro para continuar</div>
  </div>

  <!--Login -->
  <div class="card form-card text-center mt-3">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
      <div class="field text-center">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" required />
      </div>
      <div class="field text-center mt-3">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required />
      </div>
      <div class="field buttons text-center mt-3">
        <button type="submit" class="btn btn-primary">Ingresar</button>
      </div>
    </form>
  </div>

  <!-- Registro -->
  <div class="card form-card text-center mt-3">
    <h2>Registro</h2>
    <form id="registerForm">
      <div class="field text-center">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required />
      </div>
      <div class="field text-center mt-3">
        <label for="correoRegistro">Correo Electrónico</label>
        <input type="email" id="correoRegistro" required />
      </div>
      <div class="field text-center mt-3">
        <label for="passwordRegistro">Contraseña</label>
        <input type="password" id="passwordRegistro" required />
      </div>
      <div class="field buttons text-center mt-3">
        <button type="submit" class="btn btn-primary">Registrarse</button>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>&copy; 2026 Sistema de Vuelos</p>
    <p class="text-link"><a href="quienesSomos.html">By Minor Espinoza</a></p>
  </div>
</div>

<script type="module" src="login.js"></script>
<script type="module" src="sesion.js"></script>
</body>
</html>
